<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discovery Quest: Data Delivery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6ff;
      color: #1f2937;
      margin: 0;
      padding: 24px;
    }
    .game {
      max-width: 760px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }
    h1, h2, h3, p {
      text-align: center;
    }
    .subtitle {
      color: #0A1776;
      font-weight: bold;
    }
    .question-count {
      text-align: center;
      margin-bottom: 18px;
      font-weight: bold;
    }
    .option {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 14px;
      border: 2px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      font-size: 16px;
      cursor: pointer;
      text-align: left;
    }
    .option:hover {
      background: #eef2ff;
    }
    .option.correct {
      background: #dcfce7;
      border-color: #16a34a;
    }
    .option.incorrect {
      background: #fee2e2;
      border-color: #dc2626;
    }
    .feedback {
      margin-top: 18px;
      padding: 16px;
      border-radius: 10px;
      background: #eef2ff;
      display: none;
    }
    .feedback strong {
      color: #0A1776;
    }
    .controls {
      text-align: center;
      margin-top: 20px;
    }
    button.main-btn {
      padding: 12px 22px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #0A1776;
      color: white;
      cursor: pointer;
      margin: 8px;
    }
    button.main-btn:hover {
      opacity: 0.92;
    }
    .hidden {
      display: none;
    }
    .score-line {
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="game">
    <h1>🚀 Discovery Quest</h1>
    <p class="subtitle">Captain Alby's Data Delivery</p>

    <div id="start-screen">
      <h2>Mission Brief</h2>
      <p>Help Captain Alby present data clearly. Answer the questions and learn from each response.</p>
      <div class="controls">
        <button class="main-btn" onclick="startQuiz()">Start Mission</button>
      </div>
    </div>

    <div id="quiz-screen" class="hidden">
      <div class="question-count" id="question-count"></div>
      <h3 id="question-text"></h3>
      <div id="options-box"></div>
      <div id="feedback-box" class="feedback"></div>
      <div class="controls">
        <button id="next-btn" class="main-btn hidden" onclick="nextQuestion()">Next Question</button>
      </div>
    </div>

    <div id="result-screen" class="hidden">
      <h2>Mission Complete!</h2>
      <p class="score-line" id="score-text"></p>
      <p id="final-message"></p>
      <div class="controls">
        <button class="main-btn" onclick="restartQuiz()">Play Again</button>
      </div>
    </div>
  </div>

  <script>
    const quiz = [
      {
        q: "Which chart is best for showing proportions or parts of a whole?",
        options: ["Bar Chart", "Pie Chart", "Line Graph", "Pictogram"],
        answer: 1,
        explanation: "A pie chart is used to show parts of a whole."
      },
      {
        q: "Which chart is best for comparing different categories, such as bird types?",
        options: ["Pie Chart", "Line Graph", "Bar Chart", "Scatter Graph"],
        answer: 2,
        explanation: "A bar chart is best for comparing categories."
      },
      {
        q: "In this lesson, what does the word 'findings' mean?",
        options: [
          "A list of computer parts",
          "A mistake in the data",
          "Information discovered after looking closely at data",
          "A type of chart label"
        ],
        answer: 2,
        explanation: "Findings are the information you discover after analysing data carefully."
      },
      {
        q: "Which of these is one of the Golden Rules of presenting data clearly?",
        options: [
          "Use as many colours and pictures as possible",
          "Always add 3D effects",
          "Use an accurate scale with equal steps",
          "Hide the chart title"
        ],
        answer: 2,
        explanation: "Accurate scales help people read charts correctly and fairly."
      },
      {
        q: "Why should chart clutter be avoided?",
        options: [
          "It makes charts look too simple",
          "It increases the number of findings",
          "It can distract the audience and make the data harder to understand",
          "It changes a bar chart into a pie chart"
        ],
        answer: 2,
        explanation: "Too much clutter makes the chart harder to read. Clarity is king."
      },
      {
        q: "Which chart would be best for answering the question, 'Which day was the windiest?'",
        options: ["Pie Chart", "Bar Chart", "Line Graph", "Venn Diagram"],
        answer: 1,
        explanation: "A bar chart helps compare days to see which one had the highest wind level."
      },
      {
        q: "Which chart would be best for showing how temperature changed throughout the day?",
        options: ["Bar Chart", "Pie Chart", "Line Graph", "Tally Chart"],
        answer: 2,
        explanation: "A line graph is best for showing change over time."
      },
      {
        q: "Who is the audience in a data presentation?",
        options: [
          "Only the person who made the chart",
          "The computer showing the data",
          "The group of people viewing the presentation",
          "The numbers on the axis"
        ],
        answer: 2,
        explanation: "The audience is the group of people looking at the chart or presentation."
      },
      {
        q: "In the Bird Spotting dataset, which bird was spotted the most?",
        options: ["Albatross", "Seagull", "Puffin", "Pelican"],
        answer: 1,
        explanation: "Seagull had the highest number of sightings: 45."
      },
      {
        q: "The Bird Spotting dataset shows 80 total sightings and 45 Seagulls. Do Seagulls make up more than half of the total?",
        options: [
          "Yes, because 45 is more than half of 80",
          "No, because 45 is less than half of 80",
          "No, because half of 80 is 45",
          "Yes, because 80 is less than 45"
        ],
        answer: 0,
        explanation: "Half of 80 is 40, and 45 is more than 40, so yes."
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");
    const questionCount = document.getElementById("question-count");
    const questionText = document.getElementById("question-text");
    const optionsBox = document.getElementById("options-box");
    const feedbackBox = document.getElementById("feedback-box");
    const nextBtn = document.getElementById("next-btn");
    const scoreText = document.getElementById("score-text");
    const finalMessage = document.getElementById("final-message");

    function startQuiz() {
      startScreen.classList.add("hidden");
      resultScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");
      currentQuestion = 0;
      score = 0;
      loadQuestion();
    }

    function loadQuestion() {
      answered = false;
      feedbackBox.style.display = "none";
      feedbackBox.innerHTML = "";
      nextBtn.classList.add("hidden");
      optionsBox.innerHTML = "";

      const item = quiz[currentQuestion];
      questionCount.textContent = "Question " + (currentQuestion + 1) + " of " + quiz.length;
      questionText.textContent = item.q;

      item.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.textContent = option;
        btn.onclick = function() { selectAnswer(index, btn); };
        optionsBox.appendChild(btn);
      });
    }

    function selectAnswer(selectedIndex, selectedButton) {
      if (answered) return;
      answered = true;

      const item = quiz[currentQuestion];
      const buttons = document.querySelectorAll(".option");

      buttons.forEach((btn, index) => {
        btn.disabled = true;
        if (index === item.answer) {
          btn.classList.add("correct");
        }
      });

      if (selectedIndex === item.answer) {
        score++;
        feedbackBox.innerHTML = "<strong>✅ Correct!</strong><br>" + item.explanation;
      } else {
        selectedButton.classList.add("incorrect");
        feedbackBox.innerHTML = "<strong>❌ Incorrect.</strong><br>Correct answer: <strong>" + item.options[item.answer] + "</strong><br>" + item.explanation;
      }

      feedbackBox.style.display = "block";
      nextBtn.classList.remove("hidden");
    }

    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < quiz.length) {
        loadQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      quizScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");
      scoreText.textContent = "Score: " + score + " / " + quiz.length;

      if (score === quiz.length) {
        finalMessage.textContent = "Outstanding work, Data Captain! You got every answer correct.";
      } else if (score >= 7) {
        finalMessage.textContent = "Great job! You understand how to present findings clearly.";
      } else {
        finalMessage.textContent = "Good effort. Play again to improve your mission score.";
      }
    }

    function restartQuiz() {
      startQuiz();
    }
  </script>
</body>
</html>
