
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discovery Quest: Data Delivery</title>
<style>
body {
    font-family: Arial, sans-serif;
    background:#f4f6ff;
    text-align:center;
    padding:40px;
}
#game {
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
button {
    padding:12px 20px;
    margin:10px;
    font-size:16px;
    cursor:pointer;
}
.option {
    display:block;
    margin:8px 0;
}
</style>
</head>
<body>

<div id="game">
<h1>🚀 Discovery Quest</h1>
<h2>Captain Alby's Data Delivery</h2>

<div id="start">
<p>Help Captain Alby present data clearly. Answer the questions to complete the mission!</p>
<button onclick="startQuiz()">Start Mission</button>
</div>

<div id="quiz" style="display:none;">
<h3 id="question"></h3>
<div id="options"></div>
</div>

<div id="result" style="display:none;">
<h2>Mission Complete!</h2>
<p id="score"></p>
<button onclick="restart()">Play Again</button>
</div>
</div>

<script>
const quiz = [
{q:"Which chart is best for showing proportions of a whole?",options:["Bar Chart","Pie Chart","Line Graph","Scatter Graph"],answer:1},
{q:"Which chart is best for comparing different categories?",options:["Pie Chart","Line Graph","Bar Chart","Area Chart"],answer:2},
{q:"What does 'findings' mean when looking at data?",options:["A type of computer","Information discovered after analysing data","A chart colour","A mistake"],answer:1},
{q:"Which is a Golden Rule of presenting data?",options:["Use lots of pictures","Always use 3D charts","Use clear labels","Hide the title"],answer:2},
{q:"Why should charts avoid clutter?",options:["It distracts the audience","It improves charts","It adds more data","It changes the scale"],answer:0},
{q:"Which chart helps answer: 'Which day was the windiest?'",options:["Pie Chart","Bar Chart","Line Graph","Map"],answer:1},
{q:"Which chart shows change over time?",options:["Bar Chart","Pie Chart","Line Graph","Table"],answer:2},
{q:"Who is the audience?",options:["The computer","The people viewing the presentation","Only the teacher","The chart title"],answer:1},
{q:"Which bird was spotted the most in the dataset?",options:["Albatross","Seagull","Puffin","Pelican"],answer:1},
{q:"If 45 out of 80 sightings are Seagulls, are they more than half?",options:["Yes","No","Exactly half","Impossible to know"],answer:0}
];

let current = 0;
let score = 0;

function startQuiz(){
document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";
loadQuestion();
}

function loadQuestion(){
const q = quiz[current];
document.getElementById("question").innerText = q.q;
const optionsDiv = document.getElementById("options");
optionsDiv.innerHTML="";

q.options.forEach((opt,i)=>{
const btn = document.createElement("button");
btn.className="option";
btn.innerText=opt;
btn.onclick=()=>{
if(i===q.answer){score++;}
nextQuestion();
};
optionsDiv.appendChild(btn);
});
}

function nextQuestion(){
current++;
if(current>=quiz.length){
document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("score").innerText="Score: "+score+" / "+quiz.length;
}else{
loadQuestion();
}
}

function restart(){
current=0;
score=0;
document.getElementById("result").style.display="none";
document.getElementById("start").style.display="block";
}
</script>

</body>
</html>
